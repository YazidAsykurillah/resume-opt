services:
  # Laravel Application (PHP-FPM + Composer + Node.js)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeopt-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - resumeopt
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Vite Development Server
  vite:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeopt-vite
    restart: unless-stopped
    ports:
      - "5173:5173"
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    networks:
      - resumeopt
    command: npm run dev
    depends_on:
      - app

  # Queue Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resumeopt-worker
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    networks:
      - resumeopt
    depends_on:
      - app

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: web-resumeopt
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - resumeopt
      - web-gateway
    depends_on:
      - app

  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: resumeopt-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: resumeopt
      MYSQL_USER: resumeopt
      MYSQL_PASSWORD: resumeopt
      MYSQL_ROOT_PASSWORD: rootpassword
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - resumeopt
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Redis (Cache + Queue)
  redis:
    image: redis:alpine
    container_name: resumeopt-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - resumeopt
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit (Development Email)
  mailpit:
    image: axllent/mailpit
    container_name: mailpit-resumeopt
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - resumeopt
      - web-gateway

  # phpMyAdmin (Database Administration)
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: resumeopt-phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpassword
    networks:
      - resumeopt
    depends_on:
      mysql:
        condition: service_healthy

networks:
  resumeopt:
    driver: bridge
  web-gateway:
    external: true

volumes:
  mysql-data:
    driver: local
  redis-data:
    driver: local
